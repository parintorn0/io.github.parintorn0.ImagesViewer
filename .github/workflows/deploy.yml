name: Build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            manifest: io.github.parintorn0.ImagesViewer.Carousel.yml
            variant: Carousel
            runs-on: ubuntu-latest
          - arch: aarch64
            manifest: io.github.parintorn0.ImagesViewer.Carousel.yml
            variant: Carousel
            runs-on: ubuntu-24.04-arm
          - arch: x86_64
            manifest: io.github.parintorn0.ImagesViewer.Vertical.yml
            variant: Vertical
            runs-on: ubuntu-latest
          - arch: aarch64
            manifest: io.github.parintorn0.ImagesViewer.Vertical.yml
            variant: Vertical
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
      env:
        DOTNET_CLI_HOME: /tmp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout Source Repository
        uses: actions/checkout@v6
        with:
          repository: 'parintorn0/ImagesViewer'
          ref: 'main'
          token: ${{ secrets.SOURCE_TOKEN }}
          path: 'ImagesViewer'

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Setup Dotnet 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.300'

      - name: Build Flatpak Repository
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: ${{ matrix.manifest }}
          arch: ${{ matrix.arch }}
          build-bundle: false
          gpg-sign: ${{ steps.import_gpg.outputs.keyid }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      
      - name: Upload Flatpak Repository Artifact
        uses: actions/upload-artifact@v7
        with:
          name: repo-${{ matrix.variant }}-${{ matrix.arch }}
          path: repo/
          retention-days: 1

  publish:
    needs: build
    if: success()
    runs-on: ubuntu-latest

    steps:

      - name: Install ostree and flatpak
        run: sudo apt-get install -y flatpak ostree

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Download all repo artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: repo-*
          path: artifacts/

      # Use the first repo as the base, merge the rest into it
      - name: Merge all repos into one
        run: |
          ostree init --mode=archive-z2 --repo=merged-repo

          for variant in Carousel-x86_64 Carousel-aarch64 Vertical-x86_64 Vertical-aarch64; do
            SRC="artifacts/repo-$variant"
            echo "=== Merging $variant ==="
            mkdir -p "$SRC/refs/remotes"
            flatpak build-commit-from \
              --gpg-sign=${{ steps.import_gpg.outputs.keyid }} \
              --src-repo="$SRC" \
              merged-repo
          done

      - name: Update merged repo
        run: |
          flatpak build-update-repo \
            --gpg-sign=${{ steps.import_gpg.outputs.keyid }} \
            --generate-static-deltas \
            --prune \
            merged-repo
        env:
          GPG_KEY_ID: ${{ steps.import_gpg.outputs.keyid }}


      - name: Upload Flatpak Repository Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          retention-days: 1
          path: merged-repo/

  deploy:
    needs: publish
    if: success()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
