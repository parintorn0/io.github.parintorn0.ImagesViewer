app-id: io.github.parintorn0.ImagesViewer.Carousel
version: '2.2.0'
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet10
command: ImagesViewer.Carousel
build-options:
  prepend-path: "/usr/lib/sdk/dotnet10/bin"
  append-ld-library-path: "/usr/lib/sdk/dotnet10/lib"
  prepend-pkg-config-path: "/usr/lib/sdk/dotnet10/lib/pkgconfig"
  arch:
    aarch64:
      env:
        RUNTIME: linux-arm64
    x86_64:
      env:
        RUNTIME: linux-x64
finish-args:
  - --env=DOTNET_ROOT=/app/lib/dotnet
  - --socket=x11
  - --socket=wayland
  - --socket=session-bus
  - --device=dri
  - --filesystem=host:ro
modules:
  - name: dotnet
    buildsystem: simple
    build-commands:
    - /usr/lib/sdk/dotnet10/bin/install.sh
  - name: ImagesViewer.Carousel
    buildsystem: simple
    sources:
      - type: dir
        path: ImagesViewer
      - ./nuget-sources.json
      - type: dir
        path: app
    build-commands:
      - mkdir -p ${FLATPAK_DEST}/bin
      - dotnet publish ImagesViewer.Carousel -c Release --source ./nuget-sources --source /usr/lib/sdk/dotnet10/nuget/packages --runtime $RUNTIME --no-self-contained /p:TreatWarningsAsErrors=false
      - cp -r --remove-destination /run/build/ImagesViewer.Carousel/ImagesViewer.Carousel/bin/Release/net10.0/$RUNTIME/publish/* /app/bin/
      - install -D share/applications/${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -D share/metainfo/${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -D share/icons/${FLATPAK_ID}.svg /app/share/icons/hicolor/scalable/apps/$FLATPAK_ID.svg
